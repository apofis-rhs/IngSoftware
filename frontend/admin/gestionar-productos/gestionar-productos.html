<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIKA — Gestión de Productos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./gestionar-productos.css">
</head>
<body>

  <nav class="navbar admin-navbar-bg">
    <a class="navbar__logo" href="../dashboard/dashboard.html">
      <img class="navbar__logo-img" src="../../assets/img/logo.png" alt="LUMIKA">
      <span class="navbar__logo-text">LUMIKA</span>
      <span class="navbar__badge-admin">Admin</span>
    </a>
    <div class="navbar__links hide-mobile">
      <a href="../dashboard/dashboard.html" class="navbar__link"><i class="fa-solid fa-chart-pie"></i> Panel</a>
      <a href="../agregar-producto/agregar-producto.html" class="navbar__link"><i class="fa-solid fa-plus"></i> Agregar</a>
      <a href="./gestionar-productos.html" class="navbar__link navbar__link--active"><i class="fa-solid fa-boxes-stacked"></i> Gestionar</a>
      <a href="../../auth/login/login.html" id="btn-cerrar-sesion" class="navbar__link navbar__link--danger"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
    </div>
    <button class="navbar__hamburger hide-desktop" id="hamburger" aria-label="Menú">
      <span></span><span></span>
    </button>
  </nav>

  <div class="nav-drawer" id="nav-drawer">
    <a href="../dashboard/dashboard.html" class="nav-drawer__link"><i class="fa-solid fa-chart-pie"></i> Panel Administrador</a>
    <a href="../agregar-producto/agregar-producto.html" class="nav-drawer__link"><i class="fa-solid fa-plus"></i> Agregar Producto</a>
    <a href="./gestionar-productos.html" class="nav-drawer__link nav-drawer__link--active"><i class="fa-solid fa-boxes-stacked"></i> Gestionar Productos</a>
    <div class="nav-drawer__divider"></div>
    <a href="../../auth/login/login.html" id="btn-cerrar-sesion-mobile" class="nav-drawer__link nav-drawer__link--danger"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
  </div>

  <main class="page-wrapper">
    <div class="admin-view-header">
      <h2 class="text-bold"><i class="fa-solid fa-arrow-left btn-back-icon" onclick="window.history.back()"></i> Gestión de productos</h2>
      <a href="../agregar-producto/agregar-producto.html" class="btn-add-circle"><i class="fa-solid fa-plus"></i></a>
    </div>

    <div class="search-container" style="margin: var(--space-4) 0 var(--space-6);">
      <input type="text" class="admin-search-input" placeholder="Buscar producto...">
    </div>

    <div class="admin-product-list" id="lista-productos">
      <div class="product-item-card">
        <div class="product-item-card__info">
          <span class="status-indicator status-indicator--red"></span>
          <span class="product-item-card__name">Head & Shoulders</span>
        </div>
        <div class="product-item-card__actions">
          <button class="btn-action-trigger btn-action-trigger--edit" title="Editar"><i class="fa-solid fa-pen"></i></button>
          <button class="btn-action-trigger btn-action-trigger--delete" title="Eliminar"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>

      <div class="product-item-card">
        <div class="product-item-card__info">
          <span class="status-indicator status-indicator--green"></span>
          <span class="product-item-card__name">Love Beauty Planet</span>
        </div>
        <div class="product-item-card__actions">
          <button class="btn-action-trigger btn-action-trigger--edit" title="Editar"><i class="fa-solid fa-pen"></i></button>
          <button class="btn-action-trigger btn-action-trigger--delete" title="Eliminar"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>
    </div>

    <div style="margin-top: var(--space-8);">
      <a href="../dashboard/dashboard.html" class="btn-admin-back-footer">
        <i class="fa-solid fa-arrow-left"></i> Regresar
      </a>
    </div>
  </main>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navDrawer = document.getElementById('nav-drawer');
    if (hamburger) {
      hamburger.addEventListener('click', () => navDrawer.classList.toggle('open'));
      document.addEventListener('click', (e) => {
        if (!hamburger.contains(e.target) && !navDrawer.contains(e.target)) {
          navDrawer.classList.remove('open');
        }
      });
    }
  </script>
</body>
</html>
