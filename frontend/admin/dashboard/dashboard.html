<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIKA — Panel Administrador</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <link rel="stylesheet" href="/static/assets/css/variables.css">
  <link rel="stylesheet" href="/static/assets/css/base.css">
  <link rel="stylesheet" href="/static/assets/css/components.css">
  <link rel="stylesheet" href="./dashboard.css">
</head>
<body>

  <nav class="navbar admin-navbar-bg">
    <a class="navbar__logo" href="./dashboard.html">
      <img class="navbar__logo-img" src="../../assets/img/logo.png" alt="LUMIKA">
      <span class="navbar__logo-text">LUMIKA</span>
      <span class="navbar__badge-admin">Admin</span>
    </a>
    <div class="navbar__links hide-mobile">
      <a href="./dashboard.html" class="navbar__link navbar__link--active"><i class="fa-solid fa-chart-pie"></i> Panel</a>
      <a href="../agregar-producto/agregar-producto.html" class="navbar__link"><i class="fa-solid fa-plus"></i> Agregar</a>
      <a href="../gestionar-productos/gestionar-productos.html" class="navbar__link"><i class="fa-solid fa-boxes-stacked"></i> Gestionar</a>
      <a href="../../auth/login/login.html" id="btn-cerrar-sesion" class="navbar__link navbar__link--danger"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
    </div>
    <button class="navbar__hamburger hide-desktop" id="hamburger" aria-label="Menú">
      <span></span><span></span>
    </button>
  </nav>

  <div class="nav-drawer" id="nav-drawer">
    <a href="./dashboard.html" class="nav-drawer__link nav-drawer__link--active"><i class="fa-solid fa-chart-pie"></i> Panel Administrador</a>
    <a href="../agregar-producto/agregar-producto.html" class="nav-drawer__link"><i class="fa-solid fa-plus"></i> Agregar Producto</a>
    <a href="../gestionar-productos/gestionar-productos.html" class="nav-drawer__link"><i class="fa-solid fa-pen"></i> Editar Producto</a>
    <a href="../gestionar-productos/gestionar-productos.html" class="nav-drawer__link"><i class="fa-solid fa-magnifying-glass"></i> Visualizar Producto</a>
    <a href="../gestionar-productos/gestionar-productos.html" class="nav-drawer__link"><i class="fa-solid fa-trash"></i> Eliminar Producto</a>
    <div class="nav-drawer__divider"></div>
    <a href="../../auth/login/login.html" id="btn-cerrar-sesion-mobile" class="nav-drawer__link nav-drawer__link--danger"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
  </div>

  <main class="page-wrapper">
    <div class="admin-header-block">
      <h2 class="text-center text-bold" style="margin-bottom: var(--space-6); font-size: 22px;">Panel de administración</h2>
    </div>

    <div class="admin-kpi-grid">
      <div class="kpi-card kpi-card--yellow">
        <span class="kpi-card__number" id="kpi-total">-</span>
        <span class="kpi-card__label">Productos</span>
      </div>
      <div class="kpi-card kpi-card--green">
        <span class="kpi-card__number" id="kpi-verde">-</span>
        <span class="kpi-card__label">En verde</span>
      </div>
      <div class="kpi-card kpi-card--red">
        <span class="kpi-card__number" id="kpi-rojo">-</span>
        <span class="kpi-card__label">En rojo</span>
      </div>
      <div class="kpi-card kpi-card--gray">
        <span class="kpi-card__number" id="kpi-sin-info">-</span>
        <span class="kpi-card__label">Sin info</span>
      </div>
    </div>

    <div style="margin-top: var(--space-8);">
      <a href="../gestionar-productos/gestionar-productos.html" class="btn-admin-action">
        Gestionar productos
      </a>
    </div>
  </main>

  <script>
    // Menú hamburguesa responsivo
    const hamburger = document.getElementById('hamburger');
    const navDrawer = document.getElementById('nav-drawer');
    if (hamburger) {
      hamburger.addEventListener('click', () => navDrawer.classList.toggle('open'));
      document.addEventListener('click', (e) => {
        if (!hamburger.contains(e.target) && !navDrawer.contains(e.target)) {
          navDrawer.classList.remove('open');
        }
      });
    }
  </script>

  <script src="./dashboard.js"></script>

</body>
</html>
