<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIKA — Formulario Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./agregar-producto.css">
</head>
<body>

  <header class="admin-top-banner">
    <h1 id="dynamic-title" class="banner-title">Agregar producto</h1>
  </header>

  <main class="page-wrapper form-wrapper-clean">
    
    <div class="mode-selector">
      <button type="button" class="mode-tab active" id="tab-producto" onclick="switchForm('producto')">Producto</button>
      <button type="button" class="mode-tab" id="tab-articulo" onclick="switchForm('articulo')">Artículo</button>
    </div>

    <form id="form-admin-lumika" class="form-clean-layout">
      
      <div class="form-clean-group">
        <label class="form-clean-label" id="label-nombre">Nombre del producto</label>
        <input type="text" class="form-clean-input" required>
      </div>

      <div class="form-clean-row">
        <div class="form-clean-group">
          <label class="form-clean-label">Categoría</label>
          <select class="form-clean-input">
            <option value=""></option>
            <option value="shampoo">Shampoo</option>
          </select>
        </div>
        <div class="form-clean-group">
          <label class="form-clean-label">Subcategoría</label>
          <select class="form-clean-input">
            <option value=""></option>
          </select>
        </div>
      </div>

      <div class="form-clean-group" id="field-imagen">
        <label class="form-clean-label">Imagen:</label>
        <div class="form-clean-file">
          <i class="fa-solid fa-upload"></i>
          <input type="file" id="file-input" hidden>
        </div>
      </div>

      <div class="environmental-section" id="section-criterios">
        <h3 class="environmental-title">Criterios ambientales</h3>
        
        <label class="checkbox-container">
          <input type="checkbox"> <span class="checkmark"></span> Usa microplásticos
        </label>
        <label class="checkbox-container">
          <input type="checkbox"> <span class="checkmark"></span> Realiza pruebas en animales
        </label>
        <label class="checkbox-container">
          <input type="checkbox"> <span class="checkmark"></span> Tiene certificación ambiental
        </label>
        <label class="checkbox-container">
          <input type="checkbox"> <span class="checkmark"></span> Usa envases sustentables
        </label>
        <label class="checkbox-container">
          <input type="checkbox"> <span class="checkmark"></span> Usa plásticos de un solo uso
        </label>
      </div>

      <div class="form-clean-group">
        <label class="form-clean-label" id="label-ventajas">Ventajas ecológicas</label>
        <input type="text" class="form-clean-input">
      </div>

      <div class="form-clean-group">
        <label class="form-clean-label" id="label-desventajas">Desventajas ecológicas</label>
        <input type="text" class="form-clean-input">
      </div>

      <div class="action-container-clean">
        <button type="submit" class="btn-olive-large" id="btn-submit-text">Guardar producto</button>
        <a href="../dashboard/dashboard.html" class="btn-regresar-oval">
          <i class="fa-solid fa-arrow-left"></i> Regresar
        </a>
      </div>

    </form>
  </main>

  <script>
    function switchForm(mode) {
      const title = document.getElementById('dynamic-title');
      const labelNombre = document.getElementById('label-nombre');
      const labelVentajas = document.getElementById('label-ventajas');
      const labelDesventajas = document.getElementById('label-desventajas');
      const btnSubmit = document.getElementById('btn-submit-text');
      
      const fieldImagen = document.getElementById('field-imagen');
      const sectionCriterios = document.getElementById('section-criterios');
      
      const tabProducto = document.getElementById('tab-producto');
      const tabArticulo = document.getElementById('tab-articulo');

      if (mode === 'producto') {
        title.innerText = "Agregar producto";
        labelNombre.innerText = "Nombre del producto";
        labelVentajas.innerText = "Ventajas ecológicas";
        labelDesventajas.innerText = "Desventajas ecológicas";
        btnSubmit.innerText = "Guardar producto";
        
        fieldImagen.style.display = "block";
        sectionCriterios.style.display = "block";
        
        tabProducto.classList.add('active');
        tabArticulo.classList.remove('active');
      } else if (mode === 'articulo') {
        title.innerText = "Agregar Artículo";
        labelNombre.innerText = "Nombre del artículo";
        labelVentajas.innerText = "Resumen o Descripción corta";
        labelDesventajas.innerText = "Contenido / Detalles";
        btnSubmit.innerText = "Guardar artículo";
        
        fieldImagen.style.display = "none";
        sectionCriterios.style.display = "none";
        
        tabArticulo.classList.add('active');
        tabProducto.classList.remove('active');
      }
    }
  </script>
</body>
</html>
