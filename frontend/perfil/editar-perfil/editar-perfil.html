<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>LUMIKA - Editar Perfil</title>

  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./editar-perfil.css">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">

    <a class="navbar__logo" href="../../inicio/inicio.html">
      <span class="navbar__logo-text">LUMIKA</span>
    </a>

    <div class="navbar__links hide-mobile">

      <a href="../../inicio/inicio.html"
         class="navbar__link">
        <i class="fa-solid fa-house"></i>
        Inicio
      </a>

      <a href="../mi-perfil/mi-perfil.html"
         class="navbar__link navbar__link--active">
        <i class="fa-regular fa-user"></i>
        Perfil
      </a>

      <a href="../favoritos/favoritos.html"
         class="navbar__link">
        <i class="fa-regular fa-star"></i>
        Favoritos
      </a>

      <a href="#"
         id="btn-cerrar-sesion"
         class="navbar__link navbar__link--danger">
        <i class="fa-solid fa-right-from-bracket"></i>
        Cerrar sesión
      </a>

    </div>

    <button class="navbar__hamburger hide-desktop"
            id="hamburger">

      <span></span>
      <span></span>
      <span></span>

    </button>

  </nav>

  <!-- NAV-DRAWER -->
  <!-- MENÚ MÓVIL -->
<div class="nav-drawer" id="nav-drawer">

  <a href="../../inicio/inicio.html"
     class="nav-drawer__link">
    <i class="fa-solid fa-house"></i>
    Inicio
  </a>

  <a href="../mi-perfil/mi-perfil.html"
     class="nav-drawer__link">
    <i class="fa-regular fa-user"></i>
    Perfil
  </a>

  <a href="../favoritos/favoritos.html"
     class="nav-drawer__link">
    <i class="fa-regular fa-star"></i>
    Favoritos
  </a>

  <div class="nav-drawer__divider"></div>

  <a href="#"
     id="btn-cerrar-sesion-mobile"
     class="nav-drawer__link nav-drawer__link--danger">
    <i class="fa-solid fa-right-from-bracket"></i>
    Cerrar sesión
  </a>

</div>


  <!-- CONTENIDO PRINCIPAL -->
  <main class="page-wrapper">

    <div class="page-header">

      <a href="../mi-perfil/mi-perfil.html"
         class="btn-back"></a>

      <span class="page-header__title">
        Editar Perfil
      </span>

    </div>

    <div class="card">

      <div class="form-group">

        <label class="form-label">
          Nombre completo
        </label>

        <input
          type="text"
          id="nombre"
          class="input">

      </div>

      <div class="form-group">

        <label class="form-label">
          Nombre de usuario
        </label>

        <input
          type="text"
          id="usuario"
          class="input">

      </div>

      <div class="form-group">

        <label class="form-label">
          Correo electrónico
        </label>

        <input
          type="email"
          id="correo"
          class="input">

      </div>

      <button
        id="btnGuardar"
        class="btn btn-primary btn-full">

        Guardar Cambios

      </button>

      <div id="mensaje"></div>

    </div>

  </main>

  <!-- JS DE LA PANTALLA -->
  <script type="module" src="./editar-perfil.js"></script>

  <!-- SCRIPT DEL MENÚ HAMBURGUESA -->
  <script>

    const hamburger = document.getElementById('hamburger');
    const navDrawer = document.getElementById('nav-drawer');

    if (hamburger) {

      hamburger.addEventListener('click', () => {
        navDrawer.classList.toggle('open');
      });

      document.addEventListener('click', (e) => {

        if (
          !hamburger.contains(e.target) &&
          !navDrawer.contains(e.target)
        ) {
          navDrawer.classList.remove('open');
        }

      });

      window.addEventListener('resize', () => {

        if (window.innerWidth >= 769) {
          navDrawer.classList.remove('open');
        }

      });

    }

  </script>

</body>
</html>
