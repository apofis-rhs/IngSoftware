<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIKA — Cambiar Contraseña</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./cambiar-contrasena.css">
</head>
<body>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <a href="../mi-perfil/mi-perfil.html" class="btn-back"></a>
    <span class="page-header__title">Cambiar Contraseña</span>
  </div>

  <!-- CONTENIDO -->
  <main class="cambiar-wrapper" id="wrapper">

    <div class="cambiar-card" id="card">

      <div id="form-view">

        <div class="cambiar-icon-wrap">
          <i class="fa-solid fa-shield-halved"></i>
        </div>

        <h2 class="cambiar-title">Cambiar Contraseña</h2>
        <p class="cambiar-subtitle">Ingresa tu contraseña actual y establece una nueva para proteger tu cuenta.</p>

        <div id="alerta-error" class="alerta alerta--error hidden" style="margin-bottom:20px;text-align:left;border-radius:12px;">
          <span id="alerta-texto"></span>
        </div>

        <div class="form-group cambiar-form-group">
          <label class="form-label" for="contrasenaActual">Contraseña actual</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-unlock-keyhole input-icon"></i>
            <input id="contrasenaActual" class="input form-input" type="password" placeholder="••••••••">
          </div>
        </div>

        <div class="form-group cambiar-form-group">
          <label class="form-label" for="nuevaContrasena">Nueva contraseña</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input id="nuevaContrasena" class="input form-input" type="password" placeholder="••••••••">
          </div>
        </div>

        <div class="form-group cambiar-form-group" style="margin-bottom: 28px;">
          <label class="form-label" for="confirmarContrasena">Confirmar contraseña</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-check-double input-icon"></i>
            <input id="confirmarContrasena" class="input form-input" type="password" placeholder="••••••••">
          </div>
        </div>

        <div class="cambiar-btn-wrap">
          <button class="btn-guardar-pill" id="btnCambiar" type="button" style="width:100%">
            <span id="btn-texto">Cambiar Contraseña</span>
            <span id="btn-loading" class="hidden"><i class="fa-solid fa-spinner fa-spin"></i> Guardando...</span>
            <div class="cambiar-progress" id="progress"></div>
          </button>
        </div>

      </div>

      <div class="cambiar-success" id="success-view">
        <div class="cambiar-success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline class="checkmark" points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h2 class="cambiar-title" style="opacity:1;animation:none">¡Contraseña actualizada!</h2>
        <p class="cambiar-subtitle" style="opacity:1;animation:none">
          Tu contraseña se cambió correctamente. Ya puedes usar tu nueva contraseña para iniciar sesión.
        </p>
        <a href="../mi-perfil/mi-perfil.html" class="btn-regresar-outline" style="opacity:1;animation:none;margin-top:10px;">
          <i class="fa-solid fa-arrow-left"></i> Volver a mi perfil
        </a>
      </div>

    </div>
  </main>

  <script type="module" src="./cambiar-contrasena.js"></script>
</body>
</html>
