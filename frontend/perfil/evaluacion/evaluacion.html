<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIKA - Evaluación</title>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./evaluacion.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>


  <div class="page-header">
    <a href="../mi-perfil/mi-perfil.html" class="btn-back"></a>
    <span class="page-header__title">Califica tu experiencia</span>
  </div>

  <main class="page-wrapper evaluacion-wrapper">
    
    <div class="evaluacion-card" id="card">
      
      <div id="form-view">
        <div class="eval-header">
          <div class="eval-emoji" id="reaction-emoji">😶</div>
          <h2 class="eval-title">¿Qué te parece Lumika?</h2>
          <p class="eval-subtitle">Tu opinión nos ayuda a mejorar nuestra plataforma de compras sustentables.</p>
        </div>

        <div class="stars" id="estrellas">
          <i class="fa-solid fa-star star" data-value="1"></i>
          <i class="fa-solid fa-star star" data-value="2"></i>
          <i class="fa-solid fa-star star" data-value="3"></i>
          <i class="fa-solid fa-star star" data-value="4"></i>
          <i class="fa-solid fa-star star" data-value="5"></i>
        </div>

        <div id="alerta-error" class="alerta alerta--error hidden" style="margin-bottom: 20px;">
          <span id="alerta-texto"></span>
        </div>

        <div class="form-group eval-form-group">
          <label class="form-label" for="comentario">Déjanos un comentario (Opcional)</label>
          <div class="input-wrapper">
            <textarea id="comentario" class="form-input eval-textarea" placeholder="¿Qué es lo que más te gusta o qué mejorarías?"></textarea>
          </div>
        </div>

        <button id="btnEnviar" class="btn-guardar-pill" style="width: 100%;">
          <span id="btn-texto">Enviar Evaluación</span>
          <span id="btn-loading" class="hidden"><i class="fa-solid fa-spinner fa-spin"></i> Enviando...</span>
        </button>
      </div>

      <div id="success-view" class="eval-success">
        <div class="eval-success-icon">
          <i class="fa-solid fa-heart"></i>
        </div>
        <h2 class="eval-title" style="margin-top: 16px;">¡Gracias por tu tiempo!</h2>
        <p class="eval-subtitle">Hemos recibido tus comentarios. Seguiremos trabajando para darte la mejor experiencia.</p>
        <a href="../mi-perfil/mi-perfil.html" class="btn-guardar-pill" style="text-decoration: none; display: inline-flex; margin-top: 16px;">
          Volver a mi perfil
        </a>
      </div>

    </div>

  </main>

  <script type="module" src="./evaluacion.js"></script>

</body>
</html>
