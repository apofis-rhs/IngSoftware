      <a href="./mi-perfil.html"

        <i class="fa-regular fa-user"></i> Perfil
      </a>

      <a href="../favoritos/favoritos.html"
         class="navbar__link">
        <i class="fa-regular fa-star"></i> Favoritos
      </a>

      <a href="#" id="btn-cerrar-sesion"
         class="navbar__link navbar__link--danger">
        <i class="fa-solid fa-right-from-bracket"></i>

      </a>
    </div>

    <button class="navbar__hamburger hide-desktop"
            id="hamburger">

      <span></span>

        <p><strong>Nombre:</strong></p>
